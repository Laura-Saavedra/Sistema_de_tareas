{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Detalle de Tarea</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="contenedor">
        <h1>Detalle de Tarea</h1>

        <p><strong>Título:</strong> {{ tarea.titulo }}</p>
        <hr>
        <p><strong>Descripción:</strong> {{ tarea.descripcion }}</p>
        <hr>
        <p><strong>Estado:</strong> {{ tarea.estadoTarea }}</p>
        <hr>
        <p><strong>Fecha de creación:</strong> {{ tarea.fechaCreacion }}</p>

        <br>
        <a href="{% url 'editarTarea' tarea.id %}" class="boton">Editar</a>
        <a href="{% url 'eliminarTarea' tarea.id %}" class="boton-rojo">Eliminar</a>
        <a href="{% url 'listarTareas' %}">Volver a mis tareas</a>
    </div>
</body>
</html>
