{% load static %}

<link rel="stylesheet" href="{% static 'style.css' %}">

<h1>Crear tarea</h1>

<form method="POST">

    {% csrf_token %}

    <label>Titulo</label>

    <input
        type="text"
        name="titulo">

    <br><br>

    <label>Descripcion</label>

    <textarea name="descripcion"></textarea>

    <br><br>

    <label>Estado</label>

    <select name="estadoTarea">

        <option value="pendiente">
            Pendiente
        </option>

        <option value="enProceso">
            En Proceso
        </option>

        <option value="completada">
            Completada
        </option>

    </select>

    <br><br>

    <label>Prioridad</label>

    <select name="prioridad">

        <option value="baja">
            Baja
        </option>

        <option value="media">
            Media
        </option>

        <option value="alta">
            Alta
        </option>

    </select>

    <br><br>

    <label>Fecha entrega</label>

    <input
        type="date"
        name="fechaEntrega">

    <br><br>

    <label>Usuario Responsable</label>

    <select name="usuarioResponsableId">

        {% for usuario in usuarios %}

            <option value="{{ usuario.cedula }}">

                {{ usuario.nombreCompleto }}

            </option>

        {% endfor %}

    </select>

    <br><br>

    <button type="submit">

        Guardar tarea

    </button>

</form>
