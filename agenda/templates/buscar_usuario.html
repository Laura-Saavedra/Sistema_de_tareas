{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Buscar Usuario</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="contenedor">
        <h1>Nueva Agenda</h1>
        <p>Ingresa la cédula del usuario para ver sus tareas disponibles.</p>
        <form method="POST">
            {% csrf_token %}
            <p>
                <label>Cédula del usuario</label><br>
                {{ formulario.usuarioId }}
            </p>
            <button type="submit">Buscar tareas</button>
            <a href="{% url 'listar_agendas' %}">Cancelar</a>
        </form>
    </div>
</body>
</html>
