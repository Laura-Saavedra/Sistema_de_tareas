{% load static %}

<h1>Editar tarea</h1>

<link rel="stylesheet" href="{% static 'style.css' %}">

<form method="POST">

    {% csrf_token %}

    <label>Titulo</label>

    <input
        type="text"
        name="titulo"
        value="{{ tarea.titulo }}"
    >

    <br><br>

    <label>Descripcion</label>

    <textarea name="descripcion">{{ tarea.descripcion }}</textarea>

    <br><br>

    <label>Estado</label>

    <select name="estadoTarea">

        <option
            value="pendiente"
            {% if tarea.estadoTarea == 'pendiente' %}selected{% endif %}
        >
            Pendiente
        </option>

        <option
            value="enProceso"
            {% if tarea.estadoTarea == 'enProceso' %}selected{% endif %}
        >
            En proceso
        </option>

        <option
            value="completada"
            {% if tarea.estadoTarea == 'completada' %}selected{% endif %}
        >
            Completada
        </option>

    </select>

    <br><br>

    <label>Prioridad</label>

    <select name="prioridad">

        <option
            value="baja"
            {% if tarea.prioridad == 'baja' %}selected{% endif %}
        >
            Baja
        </option>

        <option
            value="media"
            {% if tarea.prioridad == 'media' %}selected{% endif %}
        >
            Media
        </option>

        <option
            value="alta"
            {% if tarea.prioridad == 'alta' %}selected{% endif %}
        >
            Alta
        </option>

    </select>

    <br><br>

    <label>Fecha entrega</label>

    <input
        type="date"
        name="fechaEntrega"
        value="{{ tarea.fechaEntrega|date:'Y-m-d' }}"
    >

    <br><br>

    <label>Cédula del Usuario Responsable</label>
    
    <input type="text" name="usuarioResponsableId" value="{{ tarea.usuarioResponsableId }}" placeholder="Ingresa la cédula">

    {% if error_cedula %}
        <p style="color: red;">{{ error_cedula }}</p>
    {% endif %}

    <br><br>

    <button type="submit">

        Actualizar tarea

    </button>

</form>
