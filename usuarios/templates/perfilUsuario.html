{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Mi Perfil</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>

    <h1>Mi Perfil</h1>

    {% for usuario in usuarios %}

        <p>
            {{ usuario.nombre }}
        </p>

        <p>
            {{ usuario.apellido }}
        </p>

        <p>
            {{ usuario.correo }}
        </p>

        <br>

        <a href="{% url 'editarUsuario' %}">
            Editar Perfil
        </a>

        <br><br>

        <a href="/usuarios/dashboard/">
            Volver al Dashboard
        </a>

    {% endfor %}

</body>

</html>
