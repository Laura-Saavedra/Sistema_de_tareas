{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <h1>Iniciar Sesión</h1>

    <form method="POST">

        {% csrf_token %}

        <input 
            type="email"
            name="correo"
            placeholder="Correo"
            required
        >

        <br><br>

        <input 
            type="password"
            name="password"
            placeholder="Contraseña"
            required
        >

        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>

    <br><br>

    <a href="/crear-usuario/">
        Crear usuario
    </a>

</body>

</html>
