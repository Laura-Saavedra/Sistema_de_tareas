{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Eliminar Agenda</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="contenedor">
        <h1>¿Eliminar agenda?</h1>
        <p>¿Estás seguro de que deseas eliminar la agenda <strong>"{{ agenda.titulo }}"</strong>?</p>
        <p>Esta acción no se puede deshacer.</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="boton-rojo">Sí, eliminar</button>
        </form>
        <a href="{% url 'listar_agendas' %}">Cancelar</a>
    </div>
</body>
</html>
