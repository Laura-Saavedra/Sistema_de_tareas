{% load static %}

<h1>Editar tarea</h1>
<link rel="stylesheet" href="{% static 'style.css' %}">

<form method="POST">

    {% csrf_token %}

    <label>Titulo</label>

    <input
        type="text"
        name="titulo"
        value="{{ tarea.titulo }}"
    >

    <br><br>

    <label>Descripcion</label>

    <textarea name="descripcion">{{ tarea.descripcion }}</textarea>

    <br><br>

    <label>Estado</label>

    <select name="estadoTarea">

        <option value="pendiente">

            Pendiente

        </option>

        <option value="enProceso">

            En proceso

        </option>

        <option value="completada">

            Completada

        </option>

    </select>

    <br><br>

    <label>Prioridad</label>

    <select name="prioridad">

        <option value="baja">

            Baja

        </option>

        <option value="media">

            Media

        </option>

        <option value="alta">

            Alta

        </option>

    </select>

    <br><br>

    <label>Fecha entrega</label>

    <input
        type="date"
        name="fechaEntrega"
        value="{{ tarea.fechaEntrega|date:'Y-m-d' }}"
    >

    <br><br>

    <label>Usuario responsable</label>

    <select name="usuarioResponsableId">

        {% for usuario in usuarios %}

            <option value="{{ usuario.id }}">

                {{ usuario.nombreCompleto }}

            </option>

        {% endfor %}

    </select>

    <br><br>

    <button type="submit">

        Actualizar tarea

    </button>

</form>
